name: Update Rouleur RSS

on:

  schedule:
    - cron: "30 */6 * * *"

  workflow_dispatch:


jobs:

  update:

    runs-on: ubuntu-latest


    steps:

    - uses: actions/checkout@v4


    - name: Install
      run: |
        pip install -r requirements.txt


    - name: Generate
      run: |
        python generate_feed.py


    - name: Commit
      run: |

        git config user.name github-actions

        git config user.email actions@github.com


        git add rouleur.xml


        git commit -m "Update RSS" || exit 0


        git push
